<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | Study Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Nunito:wght@400;600;700;800&family=Caveat:wght@500;600;700&display=swap">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/uwa_logo.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

    <header class="brand-strip">
        <a href="{{ url_for('main.index') }}"><span class="marker">Study</span> Dashboard</a>
    </header>

    <div class="login-page">

        <div class="login-card">

            <div class="login-image">
                <img src="{{ url_for('static', filename='img/login-left.png') }}"
                     alt="Study materials with headphones">
            </div>

            <div class="login-form">

                <h1>Sign in to <span class="marker">Study Dashboard</span>.</h1>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        <div class="form-errors" role="alert">
                            {% for category, message in messages %}
                                <p class="flash-{{ category }}">{{ message }}</p>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}

                <div class="social-login">
                    <button type="button" disabled title="Coming soon">
                        <svg class="google-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" aria-hidden="true">
                            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.6 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.9 6.1 29.8 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.3-.4-3.5z"/>
                            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15 18.9 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.9 6.1 29.8 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                            <path fill="#4CAF50" d="M24 44c5.1 0 9.8-2 13.3-5.3l-6.1-5.2C29.2 35.6 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
                            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.3 5.5-6.1 7.1l6.1 5.2C39.2 36.7 44 31 44 24c0-1.2-.1-2.3-.4-3.5z"/>
                        </svg>
                        <span>Continue with Google</span>
                    </button>
                    <button type="button" disabled title="Coming soon">
                        <i class="fa-brands fa-facebook facebook-icon"></i>
                        <span>Continue with Facebook</span>
                    </button>
                    <button type="button" disabled title="Coming soon">
                        <i class="fa-brands fa-apple apple-icon"></i>
                        <span>Continue with Apple</span>
                    </button>
                </div>

                <div class="divider">
                    <div></div>
                    <p>or with email</p>
                    <div></div>
                </div>

                <form method="POST" action="{{ url_for('main.login', next=request.args.get('next')) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="input-group">
                        <label for="email">Email or username</label>
                        <input type="text" id="email" name="email"
                               placeholder="you@example.com"
                               value="{{ email or '' }}" required>
                    </div>

                    <div class="input-group">
                        <div class="password-row">
                            <label for="password">Password</label>
                            <a href="#">Forgot password?</a>
                        </div>
                        <input type="password" id="password" name="password"
                               placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="login-button">Log in</button>
                </form>

                <div class="sign-up">
                    <p>
                        New here?
                        <a href="{{ url_for('main.register') }}">Make an account</a>
                    </p>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
