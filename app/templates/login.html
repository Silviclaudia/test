<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in | Study Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Nunito:wght@400;600;700;800&family=Caveat:wght@500;600;700&display=swap">

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/uwa_logo.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

    <header class="brand-strip">
        <a href="{{ url_for('main.index') }}"><span class="marker">Study</span> Dashboard</a>
    </header>

    <div class="login-page">

        <div class="login-card">

            <div class="login-image">
                <img src="{{ url_for('static', filename='img/login-left.png') }}"
                     alt="Study materials with headphones">
            </div>

            <div class="login-form">

                <h1>Sign in to <span class="marker">Study Dashboard</span>.</h1>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        <div class="form-errors" role="alert">
                            {% for category, message in messages %}
                                <p class="flash-{{ category }}">{{ message }}</p>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('main.login', next=request.args.get('next')) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="input-group">
                        <label for="email">Email or username</label>
                        <input type="text" id="email" name="email"
                               placeholder="you@example.com"
                               value="{{ email or '' }}" required>
                    </div>

                    <div class="input-group">
                        <div class="password-row">
                            <label for="password">Password</label>
                            <a href="#">Forgot password?</a>
                        </div>
                        <input type="password" id="password" name="password"
                               placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="login-button">Log in</button>
                </form>

                <div class="sign-up">
                    <p>
                        New here?
                        <a href="{{ url_for('main.register') }}">Make an account</a>
                    </p>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
