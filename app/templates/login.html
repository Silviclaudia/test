<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Responsive adjustment for a website -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <!-- External CSS file -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

  <!-- Font Awesome Icons -->
  <link 
    rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >
</head>

<body>

  <div class="login-page">

    <div class="login-card">

      <div class="login-image">
        <img src="../static/img/login-left.png" alt="Study materials with headphones">
      </div>

      <div class="login-form">

        <h1>Welcome Back</h1>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="form-errors" role="alert">
              {% for message in messages %}
                <p>{{ message }}</p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <div class="social-login">

          <button type="button">
            <svg class="google-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.6 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.9 6.1 29.8 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.3-.4-3.5z"/>
              <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15 18.9 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.9 6.1 29.8 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
              <path fill="#4CAF50" d="M24 44c5.1 0 9.8-2 13.3-5.3l-6.1-5.2C29.2 35.6 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
              <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.3 5.5-6.1 7.1l6.1 5.2C39.2 36.7 44 31 44 24c0-1.2-.1-2.3-.4-3.5z"/>
            </svg>
            <span>Login with Gmail</span>
          </button>

          <button type="button">
            <i class="fa-brands fa-facebook facebook-icon"></i>
            <span>Login with Facebook</span>
          </button>

          <button type="button">
            <i class="fa-brands fa-apple apple-icon"></i>
            <span>Login with Apple</span>
          </button>

        </div>

        <div class="divider">
          <div></div>
          <p>Or</p>
          <div></div>
        </div>

        <form method="post">

          <div class="input-group">
            <label for="email">Email</label>
            <input 
              type="text" 
              id="email" 
              name="email" 
              placeholder="Enter your email or username"
              required
            >
          </div>

          <div class="input-group">

            <div class="password-row">
              <label for="password">Password</label>
              <a href="#">Forget password?</a>
            </div>

            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Enter your password"
              required
            >

          </div>

          <button type="submit" class="login-button">Log in</button>

        </form>

        <div class="sign-up">
          <p>
            Don't have an account?
            <a href="{{ url_for('main.register') }}">Sign up</a>
          </p>
        </div>

      </div>

    </div>

  </div>

</body>

</html>
